name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      release_name:
        description: Optional release name (example Beta 5 or Research update)
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android project files
        run: flutter create --platforms=android --project-name vehicle_key_verifier .

      - name: Configure Android internet access
        shell: bash
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q 'android.permission.INTERNET' "$MANIFEST"; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET" />' "$MANIFEST"
          fi

      - name: Validate signing secrets
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64" || { echo "Missing ANDROID_KEYSTORE_BASE64"; exit 1; }
          test -n "$ANDROID_KEYSTORE_PASSWORD" || { echo "Missing ANDROID_KEYSTORE_PASSWORD"; exit 1; }
          test -n "$ANDROID_KEY_ALIAS" || { echo "Missing ANDROID_KEY_ALIAS"; exit 1; }
          test -n "$ANDROID_KEY_PASSWORD" || { echo "Missing ANDROID_KEY_PASSWORD"; exit 1; }

      - name: Restore permanent release signing key
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

          cat > android/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

          keytool -list \
            -keystore android/app/upload-keystore.jks \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -alias "$ANDROID_KEY_ALIAS" >/dev/null

      - name: Configure permanent release signing
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('android/app/build.gradle.kts')
          text = path.read_text()

          if 'import java.util.Properties' not in text:
              text = 'import java.util.Properties\nimport java.io.FileInputStream\n\n' + text

          setup = '''val keystoreProperties = Properties()\nval keystorePropertiesFile = rootProject.file("key.properties")\nif (keystorePropertiesFile.exists()) {\n    keystoreProperties.load(FileInputStream(keystorePropertiesFile))\n}\n\n'''
          if 'val keystoreProperties = Properties()' not in text:
              text = text.replace('android {', setup + 'android {', 1)

          signing_block = '''    signingConfigs {\n        create("release") {\n            keyAlias = keystoreProperties["keyAlias"] as String\n            keyPassword = keystoreProperties["keyPassword"] as String\n            storeFile = keystoreProperties["storeFile"]?.let { file(it) }\n            storePassword = keystoreProperties["storePassword"] as String\n        }\n    }\n\n'''
          if 'create("release")' not in text:
              text = text.replace('    buildTypes {', signing_block + '    buildTypes {', 1)

          text = text.replace(
              'signingConfig = signingConfigs.getByName("debug")',
              'signingConfig = signingConfigs.getByName("release")',
          )

          path.write_text(text)
          PY

      - name: Clean generated template files
        run: |
          rm -f test/widget_test.dart
          mkdir -p assets

      - name: Install dependencies
        run: flutter pub get

      - name: Analyse source
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Read version and prepare release details
        id: release
        shell: bash
        run: |
          VERSION_NAME=$(grep -m1 '^version:' pubspec.yaml | sed 's/^version:[[:space:]]*//' | cut -d'+' -f1 | tr -d '[:space:]')

          if [ -z "$VERSION_NAME" ]; then
            echo "Could not read the version from pubspec.yaml"
            exit 1
          fi

          BUILD_NUMBER="${{ github.run_number }}"
          APK_NAME="Vehicle-Key-Verifier-v${VERSION_NAME}-build${BUILD_NUMBER}.apk"
          TAG_NAME="v${VERSION_NAME}-build${BUILD_NUMBER}"

          if [ -n "${{ inputs.release_name }}" ]; then
            RELEASE_TITLE="${{ inputs.release_name }} - v${VERSION_NAME} (Build ${BUILD_NUMBER})"
          else
            RELEASE_TITLE="Vehicle Key Verifier v${VERSION_NAME} (Build ${BUILD_NUMBER})"
          fi

          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "release_title=$RELEASE_TITLE" >> "$GITHUB_OUTPUT"

      - name: Build permanently signed release APK
        run: >-
          flutter build apk --release
          --build-name=${{ steps.release.outputs.version_name }}
          --build-number=${{ steps.release.outputs.build_number }}

      - name: Verify APK signature
        shell: bash
        run: |
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -1)
          "$APKSIGNER" verify --verbose --print-certs build/app/outputs/flutter-apk/app-release.apk

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk "${{ steps.release.outputs.apk_name }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vehicle-Key-Verifier-v${{ steps.release.outputs.version_name }}-build${{ steps.release.outputs.build_number }}
          path: ${{ steps.release.outputs.apk_name }}
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag_name }}
          name: ${{ steps.release.outputs.release_title }}
          files: ${{ steps.release.outputs.apk_name }}
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
