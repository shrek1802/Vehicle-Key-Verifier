name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      release_name:
        description: Optional release name (example Beta 5 or Research update)
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android project files
        run: flutter create --platforms=android --project-name vehicle_key_verifier .

      - name: Configure Android internet access
        shell: bash
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q 'android.permission.INTERNET' "$MANIFEST"; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET" />' "$MANIFEST"
          fi
          grep -n 'android.permission.INTERNET' "$MANIFEST"

      - name: Add UK registration year support
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('lib/screens/research_screen.dart')
          text = path.read_text()

          old = """  Future<void> _researchVehicle() async {
          """
          helper = """  int? _normaliseUkYear(String input) {
            final digits = input.toUpperCase().replaceAll(RegExp(r'[^0-9]'), '');
            final maximumYear = DateTime.now().year + 1;

            if (digits.length == 4) {
              final year = int.tryParse(digits);
              if (year != null && year >= 1980 && year <= maximumYear) return year;
              return null;
            }

            if (digits.length != 2) return null;
            final ageIdentifier = int.tryParse(digits);
            if (ageIdentifier == null) return null;

            int? year;
            if (ageIdentifier >= 1 && ageIdentifier <= 49) {
              year = 2000 + ageIdentifier;
            } else if (ageIdentifier >= 51 && ageIdentifier <= 99) {
              year = 2000 + ageIdentifier - 50;
            }

            if (year == null || year < 1980 || year > maximumYear) return null;
            return year;
          }

          Future<void> _researchVehicle() async {
          """
          if old not in text:
              raise SystemExit('Could not find research method insertion point')
          text = text.replace(old, helper, 1)

          old = """    final year = int.parse(_yearController.text.trim());
          """
          new = """    final year = _normaliseUkYear(_yearController.text.trim())!;
            _yearController.text = year.toString();
          """
          if old not in text:
              raise SystemExit('Could not find year parsing code')
          text = text.replace(old, new, 1)

          text = text.replace('value: _selectedMake,', 'initialValue: _selectedMake,', 1)
          text = text.replace('value: _jobType,', 'initialValue: _jobType,', 1)

          old = """                    decoration: const InputDecoration(
                              labelText: 'Year',
                              hintText: 'For example: 2021',
                              border: OutlineInputBorder(),
                            ),
                            validator: (value) {
                              final year = int.tryParse(value?.trim() ?? '');
                              final maximumYear = DateTime.now().year + 1;
                              if (year == null) return 'Enter a valid year.';
                              if (year < 1980 || year > maximumYear) {
                                return 'Enter a year from 1980 to $maximumYear.';
                              }
                              return null;
                            },
          """
          new = """                    decoration: const InputDecoration(
                              labelText: 'Year / UK Registration',
                              hintText: 'For example: 2021, 71 or AB71 CDE',
                              helperText: 'UK age identifiers are converted automatically.',
                              border: OutlineInputBorder(),
                            ),
                            validator: (value) {
                              final year = _normaliseUkYear(value?.trim() ?? '');
                              if (year == null) {
                                return 'Enter a full year or UK registration age, e.g. 2021 or 71.';
                              }
                              return null;
                            },
          """
          if old not in text:
              raise SystemExit('Could not find year field')
          text = text.replace(old, new, 1)

          path.write_text(text)
          PY

      - name: Clean generated template files
        run: |
          rm -f test/widget_test.dart
          mkdir -p assets

      - name: Install dependencies
        run: flutter pub get

      - name: Analyse source
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Read version and prepare release details
        id: release
        shell: bash
        run: |
          VERSION_NAME=$(grep -m1 '^version:' pubspec.yaml | sed 's/^version:[[:space:]]*//' | cut -d'+' -f1 | tr -d '[:space:]')

          if [ -z "$VERSION_NAME" ]; then
            echo "Could not read the version from pubspec.yaml"
            exit 1
          fi

          BUILD_NUMBER="${{ github.run_number }}"
          APK_NAME="Vehicle-Key-Verifier-v${VERSION_NAME}-build${BUILD_NUMBER}.apk"
          TAG_NAME="v${VERSION_NAME}-build${BUILD_NUMBER}"

          if [ -n "${{ inputs.release_name }}" ]; then
            RELEASE_TITLE="${{ inputs.release_name }} - v${VERSION_NAME} (Build ${BUILD_NUMBER})"
          else
            RELEASE_TITLE="Vehicle Key Verifier v${VERSION_NAME} (Build ${BUILD_NUMBER})"
          fi

          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "release_title=$RELEASE_TITLE" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        run: >-
          flutter build apk --release
          --build-name=${{ steps.release.outputs.version_name }}
          --build-number=${{ steps.release.outputs.build_number }}

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk "${{ steps.release.outputs.apk_name }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vehicle-Key-Verifier-v${{ steps.release.outputs.version_name }}-build${{ steps.release.outputs.build_number }}
          path: ${{ steps.release.outputs.apk_name }}
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag_name }}
          name: ${{ steps.release.outputs.release_title }}
          files: ${{ steps.release.outputs.apk_name }}
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}